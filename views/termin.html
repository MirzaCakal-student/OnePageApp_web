    <h1>Appointment</h1>
    <div class="container">
        <h2>Schedule an Appointment</h2>
        <form id="appointmentForm">
            <label for="trainer">Trainer:</label>
            <select id="trainer" name="trainer" required>
                <option value="trainer1">Mujo</option>
                <option value="trainer2">Suljo</option>
                <option value="trainer3">Fata</option>
            </select><br>
            <label for="time">Time:</label>
            <select id="time" name="time" required>
                <option value="07:00">07:00 - 08:00</option>
                <option value="08:00">08:00 - 09:00</option>
                <option value="09:00">09:00 - 10:00</option>
                <option value="10:00">10:00 - 11:00</option>
                <option value="11:00">11:00 - 12:00</option>
                <option value="12:00">12:00 - 13:00</option>
                <option value="13:00">13:00 - 14:00</option>
                <option value="14:00">14:00 - 15:00</option>
                <option value="15:00">15:00 - 16:00</option>
                <option value="16:00">16:00 - 17:00</option>
                <option value="17:00">17:00 - 18:00</option>
                <option value="18:00">18:00 - 19:00</option>
                <option value="19:00">19:00 - 20:00</option>
                <option value="20:00">20:00 - 21:00</option>
                <option value="21:00">21:00 - 22:00</option>
                <option value="22:00">22:00 - 23:00</option>
            </select><br>
            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required><br>
            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label><br><br>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br>
            <button type="button" id="btn1" onclick="submitForm()">Schedule Appointment</button>
        </form>
    </div>

    <div class="container">
        <h2>Scheduled Appointments</h2>
        <table id="appointmentsTable">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Trainer</th>
                    <th>Time</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTable">
            </tbody>
        </table>
    </div>

    <footer class="text-center py-3">
        <div class="container1">
            <p><a href="mailto:info@gym.com" class="text-decoration-none text-orange">info@gym.com</a> | <a href="tel:+123456789" class="text-decoration-none text-orange">+123456789</a></p>
            <p><a href="https://www.instagram.com" target="_blank" class="text-decoration-none text-orange">@gym</a></p>
        </div>
    </footer>

    <div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background-color: #28a745; color: #fff;">
                    <h5 class="modal-title" id="confirmationModalLabel">Confirmation</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" style="color: #28a745;">
                    You have successfully scheduled an appointment!
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header" style="background-color: #dc3545; color: #fff;">
                    <h5 class="modal-title" id="errorModalLabel">Error</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" style="color: #dc3545;">
                    Please fill out all fields.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>
