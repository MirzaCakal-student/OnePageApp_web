<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGYM</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/css/toastr.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.spapp.min.js"></script>
    <script src="assets/js/index.js"></script>

</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-custom py-3">
            <div class="container-fluid px-4">
                <a class="navbar-brand" href="#">
                    <img src="assets/slike/logo.png" alt="Logo" style="height: 70px; width: 70px;">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <div class="navbar-nav ms-auto">
                        <a href="#page1" class="nav-link menuItem text-light mx-2">Home</a>
                        <a href="#page2" class="nav-link menuItem text-light mx-2">Shop</a>
                        <a href="#page3" class="nav-link menuItem text-light mx-2">Appointment</a>
                        <div class="form-check form-switch text-light ms-3">
                            <input class="form-check-input" type="checkbox" id="themeSwitch">
                            <label class="form-check-label" for="themeSwitch">Dark Mode</label>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section id="pageContent">
        <main id="spapp" role="main">
            <section id="pag1" data-load="home.html"> <h1>page1</h1></section>
            <section id="page2" data-load="shop.html"></section>
            <section id="page3" data-load="termin.html"></section>
        </main>
    </section>

    <footer class="text-center py-3">
        <div class="contact-info">
            <a href="mailto:gym@gym.com">info@gym.com</a> |
            <a href="tel:+123456789">+123456789</a> |
            <a href="https://www.instagram.com/gym" target="_blank">@gym</a>
        </div>
    </footer>


 
    <script>
     
            var app = $.spapp({
                defaultView: "#page1",
                templateDir: "./views/"
            });

            
            app.run();


    </script>
</body>
</html>
